<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Sicherheitsüberprüfung</title>
    <style>
        body {
            background-color: #050505;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            /* Extra Höhe, damit man auf iOS wischen kann und die Leisten verschwinden */
            min-height: 110vh; 
            overflow-x: hidden;
            transition: background-color 0.1s;
        }

        /* Realistischer Monitor-Effekt (Scanlines & Glow) */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        body.flash {
            background-color: #500000;
        }

        #console {
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
            text-shadow: 0 0 5px #00ff00; /* Leuchteffekt */
            display: none;
            z-index: 1;
            position: relative;
            padding-bottom: 50px;
        }
        
        .cursor {
            display: inline-block;
            width: 8px;
            height: 1rem;
            background-color: #0f0;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 5px #0f0;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Täuschend echtes iOS System-Popup */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        .alert-box {
            background: #1c1c1e;
            color: white;
            width: 270px;
            border-radius: 14px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .alert-content {
            padding: 20px;
        }
        .alert-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }
        .alert-text {
            font-size: 0.85rem;
            color: #ebebf5;
            line-height: 1.3;
        }
        .alert-btn {
            background: transparent;
            color: #0a84ff;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            width: 100%;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
        }
        .alert-btn:active {
            background: rgba(255,255,255,0.05);
            border-bottom-left-radius: 14px;
            border-bottom-right-radius: 14px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="alert-box">
            <div class="alert-content">
                <div class="alert-title">Sicherheitsproblem erkannt</div>
                <div class="alert-text">Ein wichtiges System-Update muss installiert werden, um die Verbindung abzusichern.</div>
            </div>
            <button class="alert-btn" onclick="startHack()">Installieren</button>
        </div>
    </div>

    <div id="console"></div>
    <div id="cursor" class="cursor" style="display:none;"></div>

    <script>
        // Generiert eine fake IP-Adresse für mehr Panik
        const fakeIP = "192.168." + Math.floor(Math.random() * 255) + "." + Math.floor(Math.random() * 255);

        const messages = [
            "INIT_SYS: Boot-Sequenz gestartet...",
            "Lade Kernel-Module: OK",
            "Bypasse OS-Sicherheitsprotokolle...",
            "Warnung: Firewall-Reaktion blockiert.",
            "Zielgerät IP erkannt: " + fakeIP,
            "Pinge " + fakeIP + "... Antwort erhalten.",
            "Injiziere Remote-Access-Trojaner (RAT)...",
            "Entschlüssele Keychain & lokales Dateisystem...",
            "[####                ] 21% - Lese Passwörter...",
            "[########            ] 44% - Lese Bankdaten...",
            "[##############      ] 72% - Synchronisiere Galerie...",
            "[####################] 100% - Payload erfolgreich.",
            "Aktiviere Mikrofon-Schnittstelle...",
            "> Mikrofon: ONLINE (Aufzeichnung gestartet)",
            "Fordere Zugriff auf Kameralinsen an...",
            "> Kamera: ONLINE (Stream an Server gesendet)",
            "Erstelle Backup von WhatsApp-Verläufen...",
            "Verschlüssele lokales Laufwerk...",
            "Transferiere Krypto-Wallet-Keys...",
            "Lösche digitale Spuren im System-Log...",
            "Verbindung gesichert über Onion-Routing."
        ];

        let messageIndex = 0;
        const consoleElement = document.getElementById('console');
        let audioCtx;

        function playCreepyBeep(highPitch = false) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth'; 
            
            if (highPitch) {
                oscillator.frequency.setValueAtTime(1200, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.2);
            } else {
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3); 
            }
            
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        }

        function flashScreen() {
            document.body.classList.add('flash');
            setTimeout(() => {
                document.body.classList.remove('flash');
            }, 80); 
        }

        function startHack() {
            document.getElementById('overlay').style.display = 'none';
            consoleElement.style.display = 'block';
            document.getElementById('cursor').style.display = 'inline-block';

            // Versucht Vollbild bei Android
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
            }

            // Scrollt automatisch ein Stück runter, was iOS Safari oft dazu bringt, die Leiste zu verkleinern
            setTimeout(() => {
                window.scrollTo({ top: 50, behavior: 'smooth' });
            }, 100);

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            setTimeout(printMessage, 600);
        }

        function printMessage() {
            if (messageIndex < messages.length) {
                const text = messages[messageIndex];
                consoleElement.innerHTML += text + "<br>";
                
                if (text.includes("Kamera") || text.includes("Passwörter") || text.includes("ONLINE") || text.includes("100%")) {
                    flashScreen();
                    playCreepyBeep(text.includes("Kamera")); // Extremerer Ton bei der Kamera
                } else if (Math.random() > 0.7) {
                    playCreepyBeep(); // Zufälliges leises Piepen zwischendurch
                }

                messageIndex++;
                const randomDelay = Math.random() * 150 + 50; 
                window.scrollTo(0, document.body.scrollHeight);
                setTimeout(printMessage, randomDelay);
            } else {
                setTimeout(() => {
                    flashScreen();
                    playCreepyBeep(true);
                    consoleElement.innerHTML += "<br><br><span style='color: red; font-size: 1.3rem; font-weight: bold; background: black; padding: 5px; border: 2px solid red;'>CRITICAL ERROR: SYSTEM GESPERRT</span><br>";
                    window.scrollTo(0, document.body.scrollHeight);
                }, 1000);
            }
        }
    </script>

</body>
</html>
